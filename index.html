<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery View</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
        }

        .gallery {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .img-container {
            width: 100%;
            max-width: 900px; /* عرض مثالي للأرشفة والتصفح */
            margin-bottom: 5px; /* فراغ بسيط جداً (5 بكسل) لفصل الصور تقنياً */
        }

        img {
            width: 100%;
            height: auto;
            display: block;
            border: none;
        }
    </style>
</head>
<body>

    <div class="gallery">
        <div class="img-container"><img src="gooh1.jpg" alt="gooh image 1"></div>
        <div class="img-container"><img src="gooh2.jpg" alt="gooh image 2"></div>
        <div class="img-container"><img src="gooh3.jpg" alt="gooh image 3"></div>
        <div class="img-container"><img src="gooh4.jpg" alt="gooh image 4"></div>
        <div class="img-container"><img src="gooh5.jpg" alt="gooh image 5"></div>
        <div class="img-container"><img src="gooh6.jpg" alt="gooh image 6"></div>
        <div class="img-container"><img src="gooh7.jpg" alt="gooh image 7"></div>
        <div class="img-container"><img src="gooh8.jpg" alt="gooh image 8"></div>
    </div>

</body>
</html>
