<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        /* إعدادات التصفح السريع */
        body {
            margin: 0;
            padding: 10px;
            background-color: #ffffff; /* خلفية بيضاء نقية */
            display: flex;
            justify-content: center;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
            width: 100%;
            max-width: 1400px;
        }

        .img-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px; /* زوايا خفيفة جداً */
            background-color: #f0f0f0;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            aspect-ratio: 1 / 1; /* صور مربعة متناسقة */
            transition: opacity 0.3s;
        }

        /* لضمان سرعة التحميل وتجاوب الموبايل */
        @media (max-width: 480px) {
            .gallery {
                grid-template-columns: repeat(2, 1fr); /* صورتين في الصف للجوال */
                gap: 5px;
            }
        }
    </style>
</head>
<body>

    <div class="gallery">
        <div class="img-item"><img src="gooh1.jpg" alt="gooh1" loading="lazy"></div>
        <div class="img-item"><img src="gooh2.jpg" alt="gooh2" loading="lazy"></div>
        <div class="img-item"><img src="gooh3.jpg" alt="gooh3" loading="lazy"></div>
        <div class="img-item"><img src="gooh4.jpg" alt="gooh4" loading="lazy"></div>
        <div class="img-item"><img src="gooh5.jpg" alt="gooh5" loading="lazy"></div>
        <div class="img-item"><img src="gooh6.jpg" alt="gooh6" loading="lazy"></div>
        <div class="img-item"><img src="gooh7.jpg" alt="gooh7" loading="lazy"></div>
        <div class="img-item"><img src="gooh8.jpg" alt="gooh8" loading="lazy"></div>
    </div>

</body>
</html>
