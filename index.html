<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full View Gallery</title>
    <style>
        /* تصفير الإعدادات لضمان عدم وجود هوامش */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000; /* خلفية سوداء لتركيز العين على الصور */
            overflow-x: hidden;
        }

        .full-page-gallery {
            display: flex;
            flex-direction: column; /* ترتيب عمودي */
            align-items: center;
            width: 100%;
        }

        .img-wrapper {
            width: 100%;
            max-width: 100%; /* عرض كامل الشاشة */
            margin-bottom: 0; /* لا توجد فواصل بين الصور */
        }

        img {
            width: 100%;
            height: auto; /* الحفاظ على أبعاد الصورة الأصلية كاملة */
            display: block;
            loading: lazy; /* تسريع التحميل أثناء التمرير */
        }

        /* تحسين العرض على الشاشات الكبيرة */
        @media (min-width: 1024px) {
            img {
                max-width: 800px; /* تحديد عرض مريح للعين على الكمبيوتر */
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>

    <div class="full-page-gallery">
        <img src="gooh1.jpg" alt="gooh 1 full view">
        <img src="gooh2.jpg" alt="gooh 2 full view">
        <img src="gooh3.jpg" alt="gooh 3 full view">
        <img src="gooh4.jpg" alt="gooh 4 full view">
        <img src="gooh5.jpg" alt="gooh 5 full view">
        <img src="gooh6.jpg" alt="gooh 6 full view">
        <img src="gooh7.jpg" alt="gooh 7 full view">
        <img src="gooh8.jpg" alt="gooh 8 full view">
    </div>

</body>
</html>
